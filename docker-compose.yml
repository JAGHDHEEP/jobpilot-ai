name: jobpilot

x-backend-env: &backend-env
  ENV: ${ENV:-dev}
  POSTGRES_HOST: db
  POSTGRES_USER: ${POSTGRES_USER:-jobpilot}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpilot}
  POSTGRES_DB: ${POSTGRES_DB:-jobpilot}
  REDIS_URL: redis://redis:6379/0
  CHROMA_HOST: chroma
  CHROMA_PORT: 8000
  SECRET_KEY: ${SECRET_KEY:-change-me-in-prod-please-32-bytes-min}
  AI_PROVIDER: ${AI_PROVIDER:-mock}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpilot}
      POSTGRES_DB: ${POSTGRES_DB:-jobpilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chromadata:/chroma/chroma
    ports: ["8001:8000"]

  api:
    build: ./backend
    entrypoint: ["/app/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *backend-env
    volumes:
      - uploads:/data/uploads
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["8000:8000"]

  worker:
    build: ./backend
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=info"]
    environment: *backend-env
    volumes:
      - uploads:/data/uploads
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  beat:
    build: ./backend
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "beat", "--loglevel=info"]
    environment: *backend-env
    depends_on:
      redis: {condition: service_healthy}

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on: [api]
    ports: ["3000:3000"]

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["80:80"]
    depends_on: [api, frontend]

volumes:
  pgdata:
  chromadata:
  uploads:
